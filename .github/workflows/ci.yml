name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Version from package.json "packageManager": "pnpm@9.0.0"
      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: RLS policies check
        run: pnpm check:rls

      - name: API permissions check
        run: pnpm check:permissions

      - name: Money types check
        run: pnpm check:money-types

      - name: Test
        run: pnpm test
